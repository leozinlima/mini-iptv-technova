# ==========================================================================
# API Gateway (Proxy Reverso) do Mini-IPTV  ->  roda no host R1 (Apache)
# --------------------------------------------------------------------------
# Este VirtualHost:
#   1. Serve a pagina/frontend estatico da intranet   (/var/www/iptv)
#   2. Funciona como API Gateway: repassa tudo que chega em /api/
#      para o BACKEND que esta no host S (172.16.0.2:3000).
#
# Instalar em R1:
#   sudo apt install -y apache2
#   sudo a2enmod proxy proxy_http headers
#   sudo cp iptv-gateway.conf /etc/apache2/sites-available/iptv.conf
#   sudo a2ensite iptv
#   sudo a2dissite 000-default   (opcional)
#   sudo systemctl reload apache2
# ==========================================================================

<VirtualHost *:80>
    ServerName  r1.tecnova.com.br
    ServerAlias iptv.tecnova.com.br

    # ---- Frontend estatico (pagina HTML da intranet + app Mini-IPTV) ----
    DocumentRoot /var/www/iptv
    <Directory /var/www/iptv>
        Require all granted
        DirectoryIndex index.html
    </Directory>

    # ---- API Gateway: proxy reverso de /api/ -> backend em S ----
    ProxyRequests Off
    ProxyPreserveHost On
    # O mod_proxy_http ja adiciona X-Forwarded-For com o IP real do cliente
    # (X/Y = 192.168.0.x -> WAN115K ; Z/W = rede do lab -> LAN). O backend usa
    # esse cabecalho para decidir o perfil. NAO usar "RequestHeader set" aqui:
    # o formato %{REMOTE_ADDR}s e' invalido e sobrescreve com valor errado.

    ProxyPass        /api/  http://172.16.0.2:3000/api/
    ProxyPassReverse /api/  http://172.16.0.2:3000/api/

    # ---- Servidor OAuth2/OpenID Connect (authserver em S, porta 9000) ----
    ProxyPass        /oauth/  http://172.16.0.2:9000/oauth/
    ProxyPassReverse /oauth/  http://172.16.0.2:9000/oauth/
    ProxyPass        /.well-known/  http://172.16.0.2:9000/.well-known/
    ProxyPassReverse /.well-known/  http://172.16.0.2:9000/.well-known/

    ErrorLog  ${APACHE_LOG_DIR}/iptv_error.log
    CustomLog ${APACHE_LOG_DIR}/iptv_access.log combined
</VirtualHost>

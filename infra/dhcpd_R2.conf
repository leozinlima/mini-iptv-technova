# ==========================================================================
# DHCP Server -> roda no host R2 (isc-dhcp-server), atende X e Y na LAN #2
# Instalar em R2:  sudo apt install -y isc-dhcp-server
# Copiar para:     /etc/dhcp/dhcpd.conf
# Interface:       edite /etc/default/isc-dhcp-server  ->  INTERFACESv4="<LAN2>"
#                  (LAN2 = placa de R2 ligada ao switch; ex: enxec9a0c1f7a88)
# ==========================================================================

option domain-name "tecnova.com.br";
# DNS = host S (172.16.0.2). X e Y chegam nele via R2 -> PPP -> R1 -> S.
option domain-name-servers 172.16.0.2;

default-lease-time 600;
max-lease-time 7200;
authoritative;

subnet 192.168.0.0 netmask 255.255.255.0 {
  range 192.168.0.100 192.168.0.200;      # IPs dinamicos para X e Y
  option routers 192.168.0.1;             # gateway = R2
  option subnet-mask 255.255.255.0;
  option broadcast-address 192.168.0.255;
  option domain-name "tecnova.com.br";
  option domain-name-servers 172.16.0.2;  # servidor DNS (host S)
}
